version: '3.8'

services:
  # ============================================
  # 前端构建（初始化容器，构建完成后退出）
  # ============================================
  frontend-prep:
    image: node:20-alpine
    container_name: contract-frontend-prep
    working_dir: /app
    command: sh -c "cp -r /src/* . && npm ci && npm run build"
    volumes:
      - ../client:/src:ro
      - frontend-dist:/app/dist
    restart: "no"
    networks:
      - contract-network

  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: contract-postgres
    environment:
      POSTGRES_DB: contract_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - contract-network

  # ============================================
  # NestJS 后端服务
  # ============================================
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: production
    container_name: contract-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: contract_db
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - contract-network

  # ============================================
  # Nginx 反向代理 + 前端静态文件
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: contract-nginx
    ports:
      - '${HTTP_PORT:-80}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      frontend-prep:
        condition: service_completed_successfully
      app:
        condition: service_started
    restart: always
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - contract-network

volumes:
  pgdata:
    name: contract-pgdata
  frontend-dist:
    name: contract-frontend-dist

networks:
  contract-network:
    name: contract-network
    driver: bridge
